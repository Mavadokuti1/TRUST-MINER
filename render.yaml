services:
  # Free Web Service (webhook mode) — sleeps when idle, woken by Telegram POSTs
  # and by the daily cron-job.org ping to /trigger-ingest.
  - type: web
    name: trust-miner-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false            # enter in the Render dashboard (never committed)
      - key: AFFILIATE_TAG
        sync: false
      - key: WEBHOOK_URL
        sync: false            # e.g. https://trust-miner-bot.onrender.com
      - key: TELEGRAM_CHANNEL_ID
        sync: false            # optional — only if you broadcast to a channel
      - key: TWITTER_API_KEY
        sync: false            # optional — only if you post to X
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: INGEST_SECRET
        sync: false            # optional — protects /trigger-ingest
